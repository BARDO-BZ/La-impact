  <!-- Detector de timeline viva: solo activa animaciones de entrada si el tab está
       visible y el reloj de animación avanza. Si no, el contenido queda visible igual. -->
  <script>
    (function () {
      if (document.visibilityState === "hidden") return;
      try {
        requestAnimationFrame(function (t1) {
          requestAnimationFrame(function (t2) {
            if (t2 > t1 && document.visibilityState === "visible") {
              document.documentElement.classList.add("motion-ok");
            }
          });
        });
      } catch (e) {}
    })();
  </script>
